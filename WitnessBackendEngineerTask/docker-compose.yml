services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"

  hmlr-api:
    build:
      context: .
      dockerfile: HmlrApi/Dockerfile
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"

  lease-api:
    build:
      context: .
      dockerfile: LeaseApi/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      Redis__ConnectionString: "redis:6379"
      Redis__StatusKeyPrefix: "lease:status:"
      Redis__ResultKeyPrefix: "lease:result:"
      RedisRetry__MaxAttempts: "3"
      RedisRetry__InitialDelayMs: "100"
      RedisRetry__MaxDelayMs: "1000"
      Parser__BaseUrl: "http://lease-processing"
      Parser__TriggerPath: "/api/parse"
      # Local development only. Do not commit real secrets for shared/staging/prod environments.
      Parser__ServiceToken: "local-dev-service-token"
    depends_on:
      - hmlr-api
      - redis

  lease-processing:
    platform: linux/amd64
    build:
      context: .
      dockerfile: LeaseProcessing/LeaseProcessing.Functions/Dockerfile
    environment:
      FUNCTIONS_WORKER_RUNTIME: dotnet-isolated
      AzureWebJobsStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;"
      Hmlr__BaseUrl: "http://hmlr-api:8080"
      Hmlr__Username: username
      Hmlr__Password: password
      Redis__ConnectionString: "redis:6379"
      Redis__StatusKeyPrefix: "lease:status:"
      Redis__ResultKeyPrefix: "lease:result:"
      RedisRetry__MaxAttempts: "3"
      RedisRetry__InitialDelayMs: "100"
      RedisRetry__MaxDelayMs: "1000"
      HmlrRetry__MaxAttempts: "3"
      HmlrRetry__InitialDelayMs: "200"
      HmlrRetry__MaxDelayMs: "2000"
      # Must match Lease API Parser__ServiceToken.
      ParserAuth__ServiceToken: "local-dev-service-token"
      ParserAuth__TimestampHeaderName: "X-Request-Timestamp"
      ParserAuth__NonceHeaderName: "X-Request-Nonce"
      ParserAuth__SignatureHeaderName: "X-Request-Signature"
      ParserAuth__NonceKeyPrefix: "lease:nonce:"
      ParserAuth__AllowedClockSkewSeconds: "300"
    depends_on:
      - hmlr-api
      - redis
      - azurite
